<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChocoLux | Artisanal Chocolate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Cinzel', serif; }
    .menu-panel {
      transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                  height 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                  border-radius 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">

  <!-- INTRO SCREEN -->
  <div id="intro" class="fixed inset-0 z-[9999] bg-stone-950 flex flex-col items-center justify-center transition-opacity duration-1000">
    <h1 class="text-6xl text-white font-bold tracking-[0.2em] mb-6">CL</h1>
    <div class="h-[2px] w-24 bg-amber-700"></div>
  </div>

  <!-- NAVIGATION -->
  <div id="menu-container" class="fixed top-6 left-0 w-full z-50 flex justify-center pointer-events-none">
    <div id="menu-panel" class="bg-stone-900/90 backdrop-blur-md pointer-events-auto flex flex-col items-center border border-white/10 rounded-full h-[50px] w-[140px] transition-all duration-500 overflow-hidden">
      
      <!-- Collapsed Trigger -->
      <div id="menu-trigger" class="absolute top-0 left-0 w-full h-[50px] flex items-center justify-center cursor-pointer z-50 transition-all duration-300 hover:text-amber-500">
        <span class="font-cinzel text-xs tracking-[0.2em] text-white hover:text-amber-500">MENU</span>
      </div>

      <!-- Expanded Content -->
      <div id="menu-content" class="w-full h-full pt-[60px] pb-6 px-6 opacity-0 transition-opacity duration-300 flex flex-col pointer-events-none">
        <button id="close-menu" class="absolute top-4 right-6 text-white/50 hover:text-amber-500 text-xl z-50 cursor-pointer">&times;</button>
        <div class="flex-1 overflow-y-auto">
           <div class="grid grid-cols-2 gap-3">
              <button onclick="scrollToSection('hero')" class="px-4 py-3 rounded-xl bg-white/5 hover:bg-amber-700/50 text-white font-serif text-sm">Home</button>
              <button onclick="scrollToSection('products')" class="px-4 py-3 rounded-xl bg-white/5 hover:bg-amber-700/50 text-white font-serif text-sm">Products</button>
           </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HERO SECTION -->
  <div id="hero" class="h-screen w-full relative flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 bg-stone-900">
        <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover opacity-40 mix-blend-overlay" alt="Hero">
    </div>
    <div class="relative z-30 text-center px-6 text-white">
        <h2 class="text-6xl md:text-8xl leading-tight mb-6">Indulge in <span class="italic text-amber-500">pure</span> perfection.</h2>
        <p class="text-xl text-stone-200 mb-8">Artisanal chocolate bars crafted with the finest ethically sourced cocoa.</p>
        <button onclick="scrollToSection('products')" class="px-8 py-4 border border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-white transition-all duration-500 uppercase tracking-widest text-sm">
          Explore Collection
        </button>
    </div>
  </div>

  <main class="px-8 py-20 bg-white">
    <section class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="group cursor-pointer">
        <div class="bg-stone-900 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="text-xl">Velvet Dark</h3>
        <p class="font-semibold">$12.00</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-amber-900 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="text-xl">Creamy Hazelnut</h3>
        <p class="font-semibold">$10.50</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-orange-950 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="text-xl">Sea Salt Caramel</h3>
        <p class="font-semibold">$11.00</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-stone-200 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="text-xl">White Raspberry</h3>
        <p class="font-semibold">$12.50</p>
      </div>
    </section>
  </main>

  <script>
    let isMenuExpanded = false;
    function toggleMenu(expand) {
        isMenuExpanded = expand;
        const panel = document.getElementById('menu-panel');
        const trigger = document.getElementById('menu-trigger');
        const content = document.getElementById('menu-content');
        if(expand) {
            panel.style.width = '300px';
            panel.style.height = '300px';
            panel.style.borderRadius = '32px';
            trigger.style.opacity = '0';
            content.style.opacity = '1';
            content.style.pointerEvents = 'auto';
        } else {
            panel.style.width = '140px';
            panel.style.height = '50px';
            panel.style.borderRadius = '9999px';
            trigger.style.opacity = '1';
            content.style.opacity = '0';
            content.style.pointerEvents = 'none';
        }
    }
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => document.getElementById('intro').style.display = 'none', 1000);
      }, 1000);
      document.getElementById('menu-trigger').onclick = () => toggleMenu(true);
      document.getElementById('close-menu').onclick = () => toggleMenu(false);
      window.scrollToSection = (id) => {
          document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
          toggleMenu(false);
      };
    };
  </script>
</body>
</html>
