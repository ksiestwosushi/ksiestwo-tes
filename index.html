<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChocoLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">
  <nav class="flex items-center justify-between px-8 py-6">
    <h1 class="text-2xl font-bold tracking-tight">ChocoLux</h1>
    <button class="flex items-center gap-2 bg-stone-900 text-white px-4 py-2 rounded-full text-sm">
      Cart (0)
    </button>
  </nav>
  <main class="px-8 py-12">
    <header class="max-w-3xl mb-16">
      <h2 class="text-6xl leading-tight mb-6">Indulge in <span class="italic text-amber-700">pure</span> perfection.</h2>
      <p class="text-xl text-stone-600 mb-8">Artisanal chocolate bars crafted with the finest ethically sourced cocoa.</p>
      <button class="flex items-center gap-2 text-amber-800 font-semibold border-b-2 border-amber-800 pb-1">
        Explore Collection
      </button>
    </header>
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div class="group cursor-pointer">
        <div class="bg-stone-900 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="font-serif text-xl">Velvet Dark</h3>
        <p class="font-semibold">$12.00</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-amber-900 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="font-serif text-xl">Creamy Hazelnut</h3>
        <p class="font-semibold">$10.50</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-orange-950 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="font-serif text-xl">Sea Salt Caramel</h3>
        <p class="font-semibold">$11.00</p>
      </div>
      <div class="group cursor-pointer">
        <div class="bg-stone-100 h-80 rounded-2xl mb-4 shadow-lg group-hover:shadow-xl transition-shadow"></div>
        <h3 class="font-serif text-xl">White Raspberry</h3>
        <p class="font-semibold">$12.50</p>
      </div>
    </section>
  </main>
</body>
</html>
