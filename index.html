      var isInstagram = (ua.indexOf('Instagram') > -1 || ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1);
      
      if (isInstagram) {
        var url = window.location.href;

        var isIOS = /iPad|iPhone|iPod/.test(ua);
        
        if (isAndroid) {

      document.addEventListener('click', (e) => {
        if(isMenuExpanded) {
            const container = document.getElementById('menu-container');
            const panel = document.getElementById('menu-panel');
            if(panel && !panel.contains(e.target) && !trigger.contains(e.target)) {
                toggleMenu(false);
            }
        }
      });

      setMenuState(false);

      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if(!isMenuExpanded) toggleMenu(true);
      });

      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMenu(false);
      });

      // Кастомная функция очень плавного скролла (Easing)
      function smoothScrollTo(element, duration) {
          const targetPosition = element.getBoundingClientRect().top + window.scrollY;
          const startPosition = window.scrollY;
          const distance = targetPosition - startPosition;
          let startTime = null;

          // Функция плавности (easeInOutCubic)
          function ease(t, b, c, d) {
              t /= d / 2;
              if (t < 1) return c / 2 * t * t * t + b;
              t -= 2;
              return c / 2 * (t * t * t + 2) + b;
          }

          function animation(currentTime) {
              if (startTime === null) startTime = currentTime;
              const timeElapsed = currentTime - startTime;
              const run = ease(timeElapsed, startPosition, distance, duration);
              
              window.scrollTo(0, run);
              
              if (timeElapsed < duration) {
                  requestAnimationFrame(animation);
              } else {
                  window.scrollTo(0, targetPosition); // Выравниваем финальную точку
              }
          }

          requestAnimationFrame(animation);
      }

      // Expose functions to global scope
      window.scrollToSection = function(id) {
          const el = document.getElementById(id);
          if(el) {
              if(isMenuExpanded) {
                  toggleMenu(false);
                  // Небольшая задержка, чтобы меню начало закрываться до начала скролла
                  setTimeout(() => {
                      smoothScrollTo(el, 1200); // 1.2 секунды полета
                  }, 200);
              } else {
                  smoothScrollTo(el, 1200);
              }
          }
      };
